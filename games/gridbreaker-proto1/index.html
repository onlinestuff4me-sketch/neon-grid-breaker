<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#05010f" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%94%A8%3C/text%3E%3C/svg%3E" />
<title>GRID BREAKER — PROTOTYPE 1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; overflow: hidden; background: #05010f;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    touch-action: none; user-select: none; -webkit-user-select: none;
    color: #cfefff;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  /* ------- shared neon type ------- */
  .chrome {
    font-weight: 900; font-style: italic; letter-spacing: 0.06em;
    background: linear-gradient(180deg, #ffffff 0%, #bfeaff 28%, #3ec8ff 47%, #072a4a 52%, #9ad8ff 58%, #ffffff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 12px rgba(0, 234, 255, 0.55));
  }
  .neon-pink { color: #ff2fd6; text-shadow: 0 0 10px rgba(255,47,214,.8), 0 0 30px rgba(255,47,214,.4); }
  .neon-cyan { color: #00eaff; text-shadow: 0 0 10px rgba(0,234,255,.8), 0 0 30px rgba(0,234,255,.4); }
  .dim { color: #7a8fb5; }

  /* ------- HUD ------- */
  #hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 0;
    display: none;
  }
  #hud .row { display: flex; justify-content: space-between; align-items: flex-start; }
  #hudScore { font-size: 44px; line-height: 1; text-align: center; font-variant-numeric: tabular-nums; }
  #hudBalls { font-size: 22px; font-weight: 800; }
  #hudBalls .orb { display:inline-block; width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #9ad8ff 40%, #274a6a 90%);
    box-shadow: 0 0 8px rgba(160,220,255,.9); vertical-align: -1px; margin-right: 6px; }
  #hudMulti { text-align: right; font-size: 20px; font-weight: 800; }
  #pips { margin-top: 5px; display: flex; gap: 3px; justify-content: flex-end; }
  #pips span { width: 7px; height: 7px; border-radius: 50%; background: #1c2a4a; box-shadow: inset 0 0 2px #000; }
  #pips span.on { background: #25ffc8; box-shadow: 0 0 6px rgba(37,255,200,.9); }
  #hudCombo {
    text-align: center; font-size: 20px; font-weight: 900; height: 26px; margin-top: 2px;
    opacity: 0; transition: opacity .25s; letter-spacing: .1em;
  }
  #hudCombo.show { opacity: 1; }
  #hudMsg {
    position: fixed; left: 0; right: 0; top: 34%; text-align: center; pointer-events: none;
    font-size: 26px; font-weight: 900; letter-spacing: .14em; opacity: 0; transition: opacity .3s;
  }
  #hudMsg.show { opacity: 1; }

  /* ------- flash ------- */
  #flash { position: fixed; inset: 0; pointer-events: none; opacity: 0; z-index: 8; }

  /* ------- screens ------- */
  .screen {
    position: fixed; inset: 0; z-index: 10; display: none;
    flex-direction: column; align-items: center; justify-content: center; text-align: center;
    padding: 24px; background: radial-gradient(ellipse at 50% 40%, rgba(10,2,32,.35), rgba(5,1,15,.82));
  }
  .screen.visible { display: flex; }
  .logo { font-size: clamp(44px, 13vw, 74px); line-height: .95; }
  .tagline { margin-top: 10px; font-size: 14px; letter-spacing: .5em; text-indent: .5em; }
  .weektag { margin-top: 26px; font-size: 13px; letter-spacing: .3em; text-indent: .3em; }
  .weekname { font-size: 22px; font-weight: 900; margin-top: 4px; letter-spacing: .1em; }
  .howto { margin-top: 26px; font-size: 14px; line-height: 1.75; color: #9db7dd; max-width: 320px; }
  .howto b { color: #e8f6ff; }
  .stats { margin-top: 26px; display: grid; grid-template-columns: auto auto; gap: 6px 22px;
    font-size: 15px; text-align: left; font-variant-numeric: tabular-nums; }
  .stats .v { text-align: right; font-weight: 800; color: #e8f6ff; }
  .tap { margin-top: 34px; font-size: 18px; font-weight: 900; letter-spacing: .28em; text-indent: .28em;
    animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .45 } 50% { opacity: 1 } }
  .bigscore { font-size: clamp(56px, 20vw, 96px); line-height: 1; font-variant-numeric: tabular-nums; }
  .newbest { margin-top: 8px; font-size: 15px; font-weight: 900; letter-spacing: .2em; min-height: 20px; }
  .overtitle { font-size: 15px; letter-spacing: .45em; text-indent: .45em; margin-bottom: 14px; }

  /* ------- corner buttons ------- */
  .cornerbtns { position: fixed; right: 12px; bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
    z-index: 20; display: flex; gap: 10px; }
  .cornerbtns button {
    width: 42px; height: 42px; border-radius: 50%; border: 1px solid rgba(0,234,255,.4);
    background: rgba(5,10,30,.6); color: #00eaff; font-size: 18px; cursor: pointer;
  }
  .cornerbtns button.off { opacity: .35; }
</style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div class="row">
      <div id="hudBalls"><span class="orb"></span><span id="ballCount">20</span></div>
      <div id="hudMulti" class="neon-cyan">×<span id="multiCount">1</span>
        <div id="pips"></div>
      </div>
    </div>
    <div id="hudScore" class="chrome">0</div>
    <div id="hudCombo" class="neon-pink"></div>
  </div>
  <div id="hudMsg"></div>
  <div id="flash"></div>

  <div id="startScreen" class="screen visible">
    <div class="logo chrome">GRID<br>BREAKER</div>
    <div class="tagline neon-pink">PROTOTYPE · 1</div>
    <div class="weektag dim">THIS WEEK'S GRID</div>
    <div class="weekname neon-cyan" id="weekLabel">2026-W29</div>
    <div class="howto">
      <b>TAP</b> to hurl a chrome ball.<br>
      <b>Shatter</b> every wall before you hit it.<br>
      <b>Green crystals</b> = +3 balls. Chain <b>10 in a row</b> for multiball.<br>
      Crash or miss a crystal and the chain breaks.
    </div>
    <div class="stats" id="startStats"></div>
    <div class="tap neon-cyan">TAP TO PLAY</div>
  </div>

  <div id="overScreen" class="screen">
    <div class="overtitle neon-pink">RUN TERMINATED</div>
    <div class="bigscore chrome" id="finalScore">0</div>
    <div class="newbest neon-cyan" id="bestBadge"></div>
    <div class="stats" id="overStats"></div>
    <div class="tap neon-cyan">TAP TO RETRY</div>
  </div>

  <div class="cornerbtns">
    <button id="btnSound" title="Sound">♪</button>
  </div>

  <script type="importmap">
  { "imports": { "three": "../../vendor/three.module.js", "cannon-es": "../../vendor/cannon-es.js" } }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
