<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#04101c" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%92%A0%3C/text%3E%3C/svg%3E" />
<title>TIMESHARD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; overflow: hidden; background: #04101c;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    touch-action: none; user-select: none; -webkit-user-select: none;
    color: #dff6ff;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  /* ------- shared neon type (ice accent) ------- */
  .chrome {
    font-weight: 900; font-style: italic; letter-spacing: 0.06em;
    background: linear-gradient(180deg, #ffffff 0%, #d8f4ff 30%, #6fd8ff 47%, #0b3350 52%, #b6ecff 58%, #ffffff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 12px rgba(127, 220, 255, 0.55));
  }
  .neon-ice { color: #7fdcff; text-shadow: 0 0 10px rgba(127,220,255,.85), 0 0 30px rgba(127,220,255,.4); }
  .neon-pink { color: #ff2fd6; text-shadow: 0 0 10px rgba(255,47,214,.8), 0 0 30px rgba(255,47,214,.4); }
  .dim { color: #7f97b5; }

  /* ------- HUD ------- */
  #hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 0;
    display: none;
  }
  #hud .row { display: flex; justify-content: space-between; align-items: flex-start; }
  #shields { font-size: 22px; letter-spacing: .12em; color: #7fdcff;
    text-shadow: 0 0 10px rgba(127,220,255,.8); }
  #hudAmmo { font-size: 22px; font-weight: 800; text-align: right; }
  #hudAmmo .orb { display:inline-block; width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #9ad8ff 40%, #274a6a 90%);
    box-shadow: 0 0 8px rgba(160,220,255,.9); vertical-align: -1px; margin-right: 6px; }
  #hudShards { font-size: 12px; font-weight: 800; text-align: right; letter-spacing: .18em;
    color: #7f97b5; margin-top: 4px; font-variant-numeric: tabular-nums; }
  #hudShards .n { color: #dff6ff; }
  #hudGates { font-size: 12px; font-weight: 800; letter-spacing: .18em;
    color: #7f97b5; margin-top: 4px; font-variant-numeric: tabular-nums; }
  #hudGates .n { color: #dff6ff; }
  #hudScore { font-size: 44px; line-height: 1; text-align: center; font-variant-numeric: tabular-nums; }
  #focusTrack {
    width: 140px; height: 5px; margin: 8px auto 0; border-radius: 999px;
    background: rgba(127,220,255,.14); overflow: hidden;
  }
  #focusTrack.full {
    animation: focusPulse 1s ease-in-out infinite;
  }
  @keyframes focusPulse {
    0%, 100% { box-shadow: 0 0 6px 1px rgba(127,220,255,.7); transform: scaleY(1); }
    50% { box-shadow: 0 0 22px 5px rgba(127,220,255,1), 0 0 44px 10px rgba(127,220,255,.45);
      transform: scaleY(1.7); }
  }
  #focusBar { height: 100%; width: 100%; background: #7fdcff; border-radius: 999px;
    transition: width .12s linear, background .3s; }
  #focusTrack.full #focusBar { background: #eaffff; }
  #focusLabel { text-align: center; font-size: 9px; letter-spacing: .34em; text-indent: .34em;
    color: #4d6f8a; margin-top: 5px; transition: color .3s; }
  #focusLabel.full {
    color: #eaffff; animation: focusLabelPulse 1s ease-in-out infinite;
  }
  @keyframes focusLabelPulse {
    0%, 100% { text-shadow: 0 0 6px rgba(127,220,255,.7); }
    50% { text-shadow: 0 0 14px rgba(127,220,255,1), 0 0 26px rgba(127,220,255,.7); }
  }
  #hudMsg {
    position: fixed; left: 0; right: 0; top: 32%; text-align: center; pointer-events: none;
    font-size: 24px; font-weight: 900; letter-spacing: .12em; opacity: 0; transition: opacity .3s;
    z-index: 6;
  }
  #hudMsg.show { opacity: 1; }

  /* ------- time-state tints + flash ------- */
  #flash { position: fixed; inset: 0; pointer-events: none; opacity: 0; z-index: 8; }
  #flowTint {
    position: fixed; inset: 0; pointer-events: none; opacity: 0; z-index: 4;
    background: radial-gradient(ellipse 105% 105% at 50% 50%, rgba(0,0,0,0) 55%, rgba(255,47,214,.5) 100%);
  }

  /* ------- screens ------- */
  .screen {
    position: fixed; inset: 0; z-index: 10; display: none;
    flex-direction: column; align-items: center; justify-content: center; text-align: center;
    padding: 24px; background: radial-gradient(ellipse at 50% 40%, rgba(10,36,56,.35), rgba(4,16,28,.85));
  }
  .screen.visible { display: flex; }
  /* start screen stays out of the way — the moving world IS the pitch */
  .screen.clear {
    justify-content: flex-start; padding-top: 16vh;
    background: linear-gradient(180deg, rgba(4,16,28,.55) 0%, rgba(4,16,28,.06) 45%,
      rgba(4,16,28,.06) 70%, rgba(4,16,28,.6) 100%);
  }
  /* instructions + scores sit BELOW the horizon, over the dark grid floor */
  .lowerblock {
    position: fixed; left: 0; right: 0;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 9vh);
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .controls { display: flex; flex-direction: column; gap: 9px;
    font-size: 14px; letter-spacing: .18em; color: #9fb9d8; }
  .controls b { color: #eef9ff; }
  .bestline { margin-top: 22px; font-size: 13px; letter-spacing: .14em; color: #7f97b5;
    min-height: 17px; font-variant-numeric: tabular-nums; }
  .rankline { margin-top: 6px; font-size: 10px; letter-spacing: .26em; text-indent: .26em;
    color: #4d6f8a; min-height: 13px; }
  .lowerblock .tap { margin-top: 26px; }

  /* ------- pause menu ------- */
  .menubtns { margin-top: 26px; display: flex; gap: 12px; }
  button.menubtn {
    padding: 12px 20px; border-radius: 10px; font-weight: 900; letter-spacing: .14em;
    font-size: 14px; cursor: pointer; color: #dff6ff;
    background: rgba(127,220,255,.08); border: 1px solid rgba(127,220,255,.45);
  }
  button.menubtn:active { background: rgba(127,220,255,.22); }
  button.menubtn.off { opacity: .45; }
  .pausetitle { font-size: 15px; letter-spacing: .45em; text-indent: .45em; margin-bottom: 10px; }
  .boardhead { margin-top: 26px; font-size: 11px; letter-spacing: .3em; text-indent: .3em; color: #4d6f8a; }
  .board { margin-top: 8px; display: grid; grid-template-columns: auto auto; gap: 4px 26px;
    font-size: 14px; text-align: left; font-variant-numeric: tabular-nums; }
  .board .v { text-align: right; font-weight: 800; color: #eef9ff; }
  .logo { font-size: clamp(44px, 13vw, 74px); line-height: .95; }
  .tagline { margin-top: 10px; font-size: 14px; letter-spacing: .5em; text-indent: .5em; }
  .weektag { margin-top: 26px; font-size: 13px; letter-spacing: .3em; text-indent: .3em; }
  .weekname { font-size: 22px; font-weight: 900; margin-top: 4px; letter-spacing: .1em; }
  .howto { margin-top: 26px; font-size: 14px; line-height: 1.75; color: #9fb9d8; max-width: 330px; }
  .howto b { color: #eef9ff; }
  .stats { margin-top: 26px; display: grid; grid-template-columns: auto auto; gap: 6px 22px;
    font-size: 15px; text-align: left; font-variant-numeric: tabular-nums; }
  .stats .v { text-align: right; font-weight: 800; color: #eef9ff; }
  .tap { margin-top: 34px; font-size: 18px; font-weight: 900; letter-spacing: .28em; text-indent: .28em;
    animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .45 } 50% { opacity: 1 } }
  .bigscore { font-size: clamp(56px, 20vw, 96px); line-height: 1; font-variant-numeric: tabular-nums; }
  .newbest { margin-top: 8px; font-size: 15px; font-weight: 900; letter-spacing: .2em; min-height: 20px; }
  .overtitle { font-size: 15px; letter-spacing: .45em; text-indent: .45em; margin-bottom: 14px; }

  /* ------- corner buttons ------- */
  .cornerbtns { position: fixed; right: 12px; bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
    z-index: 20; display: flex; gap: 10px; }
  .cornerbtns button {
    width: 42px; height: 42px; border-radius: 50%; border: 1px solid rgba(127,220,255,.4);
    background: rgba(6,20,34,.6); color: #7fdcff; font-size: 18px; cursor: pointer;
  }
  .cornerbtns button.off { opacity: .35; }
</style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div class="row">
      <div id="shields">◆◆◆</div>
      <div>
        <div id="hudAmmo"><span class="orb"></span><span id="ammoCount">14</span></div>
        <div id="hudShards">SHARDS <span class="n" id="shardCount">0</span></div>
        <div id="hudGates" style="text-align:right">GATES <span class="n" id="gateCount">0</span></div>
      </div>
    </div>
    <div id="hudScore" class="chrome">0</div>
    <div id="focusTrack"><div id="focusBar"></div></div>
    <div id="focusLabel">FOCUS</div>
  </div>
  <div id="hudMsg"></div>
  <div id="flowTint"></div>
  <div id="flash"></div>

  <div id="startScreen" class="screen clear visible">
    <div class="logo chrome">TIME<br>SHARD</div>
    <div class="tagline neon-pink">TIME · OBEYS · YOU</div>
    <div class="lowerblock">
      <div class="controls">
        <div><b>HOLD</b> — SLOW TIME</div>
        <div><b>DRAG</b> — WEAVE</div>
        <div><b>TAP</b> — FIRE</div>
      </div>
      <div class="bestline" id="startBest"></div>
      <div class="rankline" id="startRank"></div>
      <div class="tap neon-ice">TAP TO ENTER</div>
    </div>
  </div>

  <div id="pauseScreen" class="screen">
    <div class="pausetitle neon-ice">PAUSED</div>
    <div class="bigscore chrome" id="pauseScore">0</div>
    <div class="bestline" id="pauseShards"></div>
    <div class="menubtns">
      <button class="menubtn" id="btnResume">RESUME</button>
      <button class="menubtn" id="btnRestart">RESTART</button>
      <button class="menubtn" id="btnEndRun">END RUN</button>
    </div>
    <div class="menubtns">
      <button class="menubtn" id="btnSoundToggle">SOUND: ON</button>
    </div>
    <div class="boardhead">TOP RUNS · THIS DEVICE</div>
    <div class="board" id="pauseTop"></div>
    <div class="boardhead">RECENT RUNS</div>
    <div class="board" id="pauseRecent"></div>
  </div>

  <div id="overScreen" class="screen">
    <div class="overtitle neon-pink" id="overTitle">YOU DIED</div>
    <div class="bigscore chrome" id="finalScore">0</div>
    <div class="newbest neon-ice" id="bestBadge"></div>
    <div class="stats" id="overStats"></div>
    <div class="menubtns">
      <button class="menubtn" id="btnMenu">MENU</button>
    </div>
    <div class="tap neon-ice">TAP TO RETRY</div>
  </div>

  <div class="cornerbtns">
    <button id="btnSound" title="Sound" style="display:none">♪</button>
    <button id="btnPause" title="Pause" style="display:none">⏸</button>
  </div>

  <script type="importmap">
  { "imports": { "three": "../../vendor/three.module.js", "cannon-es": "../../vendor/cannon-es.js" } }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
